<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 语音助手</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  body { font-family: 'Inter', sans-serif; background: #0a0e17; }
  .chat-scroll::-webkit-scrollbar { width: 4px; }
  .chat-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
  @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
  @keyframes wave { 0%,100% { height: 8px; } 50% { height: 24px; } }
  .recording-ring { animation: pulse-ring 1s ease-out infinite; }
  .wave-bar { animation: wave 0.6s ease-in-out infinite; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.15s; }
  .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
  .msg-user { background: linear-gradient(135deg, #1e40af, #3b82f6); }
  .msg-ai { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(51, 65, 85, 0.4); }
  .btn-glow:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
  input[type=range] { -webkit-appearance: none; background: transparent; }
  input[type=range]::-webkit-slider-track { height: 4px; background: #1e293b; border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #3b82f6; margin-top: -6px; cursor: pointer; }
</style>
</head>
<body class="min-h-screen flex flex-col text-gray-200">

<!-- Header -->
<header class="glass px-4 py-3 flex items-center justify-between shrink-0 z-10">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-lg">🤖</div>
    <div>
      <h1 class="text-base font-semibold text-white leading-tight">AI 语音助手</h1>
      <p class="text-xs text-gray-400" id="voiceLabel">音色: male-qn-qingse</p>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <div id="playingIndicator" class="hidden flex items-center gap-1 px-2 py-1 rounded-full bg-blue-500/20 text-blue-400 text-xs">
      <svg class="w-3 h-3 animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8.132v3.736a1 1 0 001.555.832l3.197-1.868a1 1 0 000-1.664L9.555 7.168z"/></svg>
      播放中
    </div>
    <button onclick="toggleSettings()" class="w-9 h-9 rounded-xl glass flex items-center justify-center hover:bg-slate-700/50 transition btn-glow" title="设置">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </button>
  </div>
</header>

<!-- Chat Area -->
<div id="chatArea" class="flex-1 overflow-y-auto chat-scroll px-4 py-4 space-y-3">
  <div class="flex justify-center">
    <span class="text-xs text-gray-500 glass px-3 py-1 rounded-full">对话开始 · 支持文字和语音输入</span>
  </div>
</div>

<!-- Settings Panel -->
<div id="settingsPanel" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center" onclick="if(event.target===this)toggleSettings()">
  <div class="absolute inset-0 bg-black/50"></div>
  <div class="relative glass w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl p-5 space-y-4 max-h-[80vh] overflow-y-auto chat-scroll">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-semibold text-white">设置</h2>
      <button onclick="toggleSettings()" class="w-8 h-8 rounded-lg hover:bg-slate-700/50 flex items-center justify-center">✕</button>
    </div>

    <!-- Voice Selection -->
    <div>
      <label class="text-sm text-gray-400 mb-2 block">TTS 音色</label>
      <div id="voiceList" class="grid grid-cols-1 gap-1.5"></div>
    </div>

    <!-- Speed / Pitch -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-sm text-gray-400 mb-1 block">语速 <span id="speedVal">1.0</span></label>
        <input type="range" min="0.5" max="2" step="0.1" value="1" class="w-full" id="speedRange" oninput="document.getElementById('speedVal').textContent=this.value">
      </div>
      <div>
        <label class="text-sm text-gray-400 mb-1 block">音调 <span id="pitchVal">0</span></label>
        <input type="range" min="-12" max="12" step="1" value="0" class="w-full" id="pitchRange" oninput="document.getElementById('pitchVal').textContent=this.value">
      </div>
    </div>

    <!-- Emotion -->
    <div>
      <label class="text-sm text-gray-400 mb-2 block">情感</label>
      <div class="flex flex-wrap gap-1.5" id="emotionList"></div>
    </div>

    <!-- Voice Clone -->
    <div class="border-t border-slate-700/50 pt-4">
      <h3 class="text-sm font-medium text-white mb-2">🎤 音色克隆</h3>
      <p class="text-xs text-gray-500 mb-3">上传一段清晰的人声音频（建议10-30秒），自动克隆音色</p>
      <div class="flex items-center gap-2 mb-2">
        <label class="flex-1 glass rounded-xl px-3 py-2.5 text-sm cursor-pointer hover:bg-slate-700/30 transition flex items-center gap-2">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
          <span id="cloneFileLabel" class="text-gray-400 truncate">选择音频文件</span>
          <input type="file" accept="audio/*" class="hidden" id="cloneFileInput" onchange="onCloneFileSelected(this)">
        </label>
        <input type="text" id="cloneVoiceName" placeholder="音色名称" class="glass rounded-xl px-3 py-2.5 text-sm w-36 text-white placeholder-gray-500" maxlength="32">
      </div>
      <button onclick="startVoiceClone()" id="cloneBtn" class="w-full py-2.5 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600 text-white text-sm font-medium hover:opacity-90 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
        开始克隆
      </button>
      <div id="cloneProgress" class="hidden mt-2 text-xs text-gray-400 space-y-1"></div>
    </div>
  </div>
</div>

<!-- Input Bar -->
<div class="glass px-4 py-3 shrink-0 z-10">
  <div class="flex items-end gap-2 max-w-2xl mx-auto">
    <!-- Record Button -->
    <button id="recordBtn" onclick="toggleRecording()" class="w-11 h-11 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shrink-0 hover:opacity-90 transition relative">
      <svg id="micIcon" class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/></svg>
      <div id="recordRing" class="hidden absolute inset-0 rounded-xl border-2 border-red-400 recording-ring"></div>
    </button>
    <!-- Wave indicator -->
    <div id="waveIndicator" class="hidden flex items-center gap-0.5 px-1">
      <div class="wave-bar w-1 bg-blue-400 rounded-full" style="height:8px"></div>
      <div class="wave-bar w-1 bg-blue-400 rounded-full" style="height:8px"></div>
      <div class="wave-bar w-1 bg-blue-400 rounded-full" style="height:8px"></div>
      <div class="wave-bar w-1 bg-blue-400 rounded-full" style="height:8px"></div>
      <div class="wave-bar w-1 bg-blue-400 rounded-full" style="height:8px"></div>
    </div>
    <!-- Text Input -->
    <input type="text" id="textInput" placeholder="输入消息..." class="flex-1 bg-slate-800/50 rounded-xl px-4 py-2.5 text-sm text-white placeholder-gray-500 outline-none focus:ring-1 focus:ring-blue-500/50" onkeydown="if(event.key==='Enter')sendMessage()">
    <!-- Send Button -->
    <button onclick="sendMessage()" class="w-11 h-11 rounded-xl glass flex items-center justify-center shrink-0 hover:bg-slate-700/50 transition btn-glow">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
    </button>
  </div>
</div>

<script>
const API_KEY = 'sk-qmuPkPTmn0kjo1RA7k1TczQ9zDEbptetDhiMa0NIDu8brAGY';
const LLM_URL = 'https://yunwu.ai/v1/chat/completions';
const TTS_URL = 'https://yunwu.ai/minimax/v1/t2a_v2';
const UPLOAD_URL = 'https://yunwu.ai/minimax/v1/files/upload';
const CLONE_URL = 'https://yunwu.ai/minimax/v1/voice_clone';

const SYSTEM_PROMPT = '你是一个友好的AI助手。请用简洁自然的语言回复，适合语音朗读。如果用户用中文提问，用中文回复；英文则用英文。回复尽量简短（1-3句话）。';

const PRESET_VOICES = [
  { id: 'male-qn-qingse', label: '青涩男声', tag: '中文' },
  { id: 'female-chengshu', label: '成熟女声', tag: '中文' },
  { id: 'female-tianmei', label: '甜美女声', tag: '中文' },
  { id: 'English_Graceful_Lady', label: 'Graceful Lady', tag: '英文' },
  { id: 'English_Persuasive_Man', label: 'Persuasive Man', tag: '英文' },
];

const EMOTIONS = ['happy', 'sad', 'angry', 'fearful', 'surprised', 'gentle', 'serious', 'indifferent'];

let currentVoiceId = PRESET_VOICES[0].id;
let currentEmotion = 'happy';
let chatHistory = [{ role: 'system', content: SYSTEM_PROMPT }];
let customVoices = [];
let isRecording = false;
let recognition = null;
let currentAudio = null;
let isSending = false;
let selectedCloneFile = null;

// Init
document.addEventListener('DOMContentLoaded', () => {
  renderVoices();
  renderEmotions();
  initSpeechRecognition();
});

// --- Voices ---
function renderVoices() {
  const c = document.getElementById('voiceList');
  const all = [...PRESET_VOICES.map(v => ({...v, preset: true})), ...customVoices.map(v => ({...v, preset: false}))];
  c.innerHTML = all.map(v => `
    <button onclick="selectVoice('${v.id}')" class="voice-opt flex items-center justify-between px-3 py-2 rounded-lg text-sm transition ${v.id === currentVoiceId ? 'bg-blue-500/20 text-blue-400 ring-1 ring-blue-500/40' : 'hover:bg-slate-700/40 text-gray-300'}">
      <span>${v.label}</span>
      <span class="text-xs opacity-60">${v.preset ? v.tag : '自定义'}</span>
    </button>
  `).join('');
}

function selectVoice(id) {
  currentVoiceId = id;
  const all = [...PRESET_VOICES, ...customVoices];
  const v = all.find(x => x.id === id);
  document.getElementById('voiceLabel').textContent = `音色: ${v ? v.label : id}`;
  renderVoices();
}

// --- Emotions ---
function renderEmotions() {
  const c = document.getElementById('emotionList');
  c.innerHTML = EMOTIONS.map(e => `
    <button onclick="selectEmotion('${e}')" class="px-2.5 py-1 rounded-lg text-xs transition ${e === currentEmotion ? 'bg-blue-500/20 text-blue-400 ring-1 ring-blue-500/40' : 'bg-slate-800/50 text-gray-400 hover:bg-slate-700/50'}">${e}</button>
  `).join('');
}

function selectEmotion(e) {
  currentEmotion = e;
  renderEmotions();
}

// --- Settings ---
function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  p.classList.toggle('hidden');
}

// --- Speech Recognition ---
function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'zh-CN';
  recognition.onresult = (e) => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('textInput').value = t;
  };
  recognition.onend = () => {
    isRecording = false;
    updateRecordUI();
    const text = document.getElementById('textInput').value.trim();
    if (text) sendMessage();
  };
  recognition.onerror = () => { isRecording = false; updateRecordUI(); };
}

function toggleRecording() {
  if (isRecording) {
    recognition?.stop();
    isRecording = false;
  } else {
    if (!recognition) { alert('浏览器不支持语音识别'); return; }
    document.getElementById('textInput').value = '';
    recognition.start();
    isRecording = true;
  }
  updateRecordUI();
}

function updateRecordUI() {
  document.getElementById('recordRing').classList.toggle('hidden', !isRecording);
  document.getElementById('waveIndicator').classList.toggle('hidden', !isRecording);
  document.getElementById('recordBtn').classList.toggle('from-red-500', isRecording);
  document.getElementById('recordBtn').classList.toggle('to-red-600', isRecording);
}

// --- Chat ---
function addMessage(role, text, loading = false) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
  const id = 'msg-' + Date.now();
  div.innerHTML = `
    <div class="max-w-[80%] sm:max-w-[60%] ${role === 'user' ? 'msg-user' : 'msg-ai'} rounded-2xl px-4 py-2.5 text-sm leading-relaxed ${role === 'user' ? 'rounded-br-md' : 'rounded-bl-md'}">
      ${role === 'user' ? text : `<span id="${id}">${loading ? '<span class="inline-flex gap-1"><span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></span><span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0.15s"></span><span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0.3s"></span></span>' : text}</span>`}
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return id;
}

async function sendMessage() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text || isSending) return;
  input.value = '';
  isSending = true;

  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  const aiId = addMessage('ai', '', true);

  try {
    const res = await fetch(LLM_URL, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'gpt-4o', messages: chatHistory })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '抱歉，我无法回复。';
    chatHistory.push({ role: 'assistant', content: reply });
    document.getElementById(aiId).textContent = reply;
    await playTTS(reply);
  } catch (e) {
    document.getElementById(aiId).textContent = '❌ 请求失败: ' + e.message;
  }
  isSending = false;
}

// --- TTS ---
function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2) bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
  return bytes;
}

async function playTTS(text) {
  try {
    const speed = parseFloat(document.getElementById('speedRange').value);
    const pitch = parseInt(document.getElementById('pitchRange').value);
    const res = await fetch(TTS_URL, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'speech-2.8-hd',
        text,
        stream: false,
        voice_setting: { voice_id: currentVoiceId, speed, vol: 1, pitch, emotion: currentEmotion },
        audio_setting: { sample_rate: 32000, bitrate: 128000, format: 'mp3', channel: 1 }
      })
    });
    const data = await res.json();
    if (data.base_resp?.status_code !== 0) throw new Error(data.base_resp?.status_msg || 'TTS failed');
    const bytes = hexToBytes(data.data.audio);
    const blob = new Blob([bytes], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
    currentAudio = new Audio(url);
    const ind = document.getElementById('playingIndicator');
    ind.classList.remove('hidden');
    currentAudio.onended = () => { ind.classList.add('hidden'); URL.revokeObjectURL(url); };
    currentAudio.onerror = () => { ind.classList.add('hidden'); URL.revokeObjectURL(url); };
    await currentAudio.play();
  } catch (e) {
    console.error('TTS error:', e);
  }
}

// --- Voice Clone ---
function onCloneFileSelected(input) {
  selectedCloneFile = input.files[0];
  document.getElementById('cloneFileLabel').textContent = selectedCloneFile?.name || '选择音频文件';
  document.getElementById('cloneBtn').disabled = !selectedCloneFile;
}

async function startVoiceClone() {
  if (!selectedCloneFile) return;
  const name = document.getElementById('cloneVoiceName').value.trim();
  if (!name) { alert('请输入音色名称'); return; }
  // Validate voice_id
  const vid = 'Clone_' + name.replace(/[^a-zA-Z0-9\-]/g, '').replace(/^-|-$/g, '');
  if (vid.length < 8) { alert('音色名称太短（至少需要几个有效字符）'); return; }

  const btn = document.getElementById('cloneBtn');
  const prog = document.getElementById('cloneProgress');
  btn.disabled = true;
  btn.textContent = '克隆中...';
  prog.classList.remove('hidden');

  const log = (msg) => { prog.innerHTML += `<div>${msg}</div>`; };
  try {
    // Step A: Upload main file
    log('📤 步骤 1/2: 上传音频文件...');
    const fd = new FormData();
    fd.append('file', selectedCloneFile);
    fd.append('purpose', 'voice_clone');
    const upRes = await fetch(UPLOAD_URL, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${API_KEY}` },
      body: fd
    });
    const upData = await upRes.json();
    if (upData.base_resp?.status_code !== 0) throw new Error('上传失败: ' + (upData.base_resp?.status_msg || ''));
    const fileId = upData.file.file_id;
    log(`✅ 文件已上传 (file_id: ${fileId})`);

    // Step B: Clone (without prompt file for simplicity)
    log('🧬 步骤 2/2: 克隆音色...');
    const cloneRes = await fetch(CLONE_URL, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        file_id: fileId,
        voice_id: vid,
        text: '你好，这是一段测试语音。',
        model: 'speech-2.8-hd',
        language_boost: 'auto',
        need_noise_reduction: true,
        need_volume_normalization: true,
        aigc_watermark: false
      })
    });
    const cloneData = await cloneRes.json();
    if (cloneData.base_resp?.status_code !== 0) throw new Error('克隆失败: ' + (cloneData.base_resp?.status_msg || ''));

    customVoices.push({ id: vid, label: name });
    selectVoice(vid);
    renderVoices();
    log('🎉 克隆成功！已切换到新音色');
  } catch (e) {
    log('❌ ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '开始克隆';
  }
}
</script>
</body>
</html>
